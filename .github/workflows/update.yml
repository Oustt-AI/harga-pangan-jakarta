name: Update Harga
on:
  schedule:
    - cron: '0 20 * *' # 03:00 WIB
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install playwright pytz
      - run: playwright install chromium
      - run: python scraper.py
      - name: Commit
        run: |
          git config user.name "harga-bot"
          git config user.email "bot@github.com"
          git add data.json
          git diff --cached --quiet || (git commit -m "update $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
