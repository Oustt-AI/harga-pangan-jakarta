name: Update Harga
on:
  schedule:
    - cron: '0 20 * * *' # jam 03:00 WIB
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 pytz
      - run: python scraper.py
      - run: |
          git config user.name "harga-bot"
          git config user.email "bot@github.com"
          git add data.json
          git diff --cached --quiet || (git commit -m "update $(date -u +%Y-%m-%d)" && git push)
